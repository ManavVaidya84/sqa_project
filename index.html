<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Cyber Security Login</title>

<style>

body{
margin:0;
padding:0;
background:black;
font-family:Consolas,monospace;
overflow:hidden;
color:#00ff9f;
}

/* MATRIX BACKGROUND */

canvas{
position:fixed;
top:0;
left:0;
z-index:-1;
}

/* LOGIN CARD */

.login-container{

position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);

width:420px;
padding:45px;

background:rgba(0,0,0,0.85);
border:1px solid #00ff9f;
border-radius:12px;

box-shadow:
0 0 20px #00ff9f,
0 0 50px #00ff9f;

text-align:center;

}

/* TITLE */

.title{

font-size:26px;
letter-spacing:3px;
margin-bottom:30px;

text-shadow:0 0 10px #00ff9f;

}

/* INPUTS */

input{

width:100%;
padding:13px;
margin:12px 0;

background:#000;
border:1px solid #00ff9f;
border-radius:6px;

color:#00ff9f;
font-size:15px;

}

input:focus{

outline:none;
box-shadow:0 0 10px #00ff9f;

}

/* BUTTON */

button{

width:100%;
padding:13px;

margin-top:15px;

background:#00ff9f;
border:none;
border-radius:6px;

font-weight:bold;
font-size:16px;

cursor:pointer;

transition:0.3s;

}

button:hover{

background:#00ffaa;

box-shadow:
0 0 15px #00ff9f,
0 0 30px #00ff9f;

transform:scale(1.03);

}

/* MESSAGE */

#message{

margin-top:18px;
font-weight:bold;
font-size:15px;

}

</style>

</head>

<body>

<canvas id="matrix"></canvas>

<div class="login-container">

<div class="title">CYBER SECURITY LOGIN</div>

<input type="text" id="username" placeholder="Enter Username">

<input type="password" id="password" placeholder="Enter Password">

<button id="loginBtn" onclick="validateLogin()">LOGIN</button>

<p id="message"></p>

</div>

<script>

/* MATRIX ANIMATION */

let canvas=document.getElementById("matrix");
let ctx=canvas.getContext("2d");

canvas.height=window.innerHeight;
canvas.width=window.innerWidth;

let letters="01";
letters=letters.split("");

let fontSize=14;
let columns=canvas.width/fontSize;

let drops=[];

for(let x=0;x<columns;x++)
drops[x]=1;

function draw(){

ctx.fillStyle="rgba(0,0,0,0.05)";
ctx.fillRect(0,0,canvas.width,canvas.height);

ctx.fillStyle="#00ff9f";
ctx.font=fontSize+"px monospace";

for(let i=0;i<drops.length;i++){

let text=letters[Math.floor(Math.random()*letters.length)];

ctx.fillText(text,i*fontSize,drops[i]*fontSize);

if(drops[i]*fontSize>canvas.height && Math.random()>0.975)
drops[i]=0;

drops[i]++;

}

}

setInterval(draw,33);


/* LOGIN VALIDATION */

function validateLogin(){

let username=document.getElementById("username").value;
let password=document.getElementById("password").value;
let message=document.getElementById("message");

if(username=="" || password==""){
message.innerHTML="⚠ Fields cannot be empty";
message.style.color="orange";
}

else if(password.length < 6){
message.innerHTML="⚠ Password must be at least 6 characters";
message.style.color="yellow";
}

else if(username=="admin" && password=="cyber123"){
message.innerHTML="✔ Access Granted";
message.style.color="lime";
}

else{
message.innerHTML="✖ Invalid Credentials";
message.style.color="red";
}
setTimeout(function(){
window.location.href="dashboard.html";
},1000);

}

</script>

</body>
</html>
